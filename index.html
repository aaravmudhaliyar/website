<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Aarav Photography — A fine art photography portfolio capturing landscapes, portraits, street scenes, and beyond.">
  <meta property="og:title" content="Aarav Photography">
  <meta property="og:description" content="Fine art photography — landscapes, portraits, street scenes, and beyond.">
  <meta name="twitter:card" content="summary_large_image">
  <title>Aarav Photography</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,200;0,300;0,400;0,500;0,600;1,200;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ============ HEADER ============ -->
  <header id="site-header" class="site-header">
    <div class="header-inner">
      <nav class="nav-left" aria-label="Primary navigation">
        <a href="work.html" class="nav-link" id="nav-work">Work</a>
        <a href="about.html" class="nav-link" id="nav-about">About</a>
      </nav>

      <a href="index.html" class="site-logo" id="site-logo" aria-label="Aarav Photography Home">
        Aarav
      </a>

      <nav class="nav-right" aria-label="Secondary navigation">
        <a href="https://instagram.com/apm_clicks" class="social-link" id="header-instagram" aria-label="Instagram" target="_blank" rel="noopener noreferrer">
          <i class="fa-brands fa-instagram" aria-hidden="true"></i>
        </a>
        <a href="https://linkedin.com/in/apm_clicks" class="social-link" id="header-linkedin" aria-label="LinkedIn" target="_blank" rel="noopener noreferrer">
          <i class="fa-brands fa-linkedin-in" aria-hidden="true"></i>
        </a>
        <a href="mailto:aaravmudhaliyar@gmail.com" class="social-link" id="header-email" aria-label="Send email">
          <i class="fa-regular fa-envelope" aria-hidden="true"></i>
        </a>
      </nav>
    </div>
  </header>

  <!-- ============ HERO ============ -->
  <section class="hero" id="hero" aria-label="Hero section">
    <div class="hero-content">
      <p class="hero-eyebrow">Fine Art Photography</p>
      <h1 class="hero-title">Aarav<br><em>Mudhaliyar</em></h1>
      <p class="hero-sub">Light. Silence. Story.</p>
    </div>
  </section>

  <!-- ============ FOOTER ============ -->
  <footer class="site-footer" role="contentinfo">
    <div class="footer-inner">
      <a href="#" class="footer-logo" aria-label="Aarav Photography">Aarav</a>
      <p class="footer-tagline">Fine Art Photography</p>
      <nav class="footer-social" aria-label="Social media links">
        <a href="https://instagram.com/yourhandle" class="social-link" id="footer-instagram" aria-label="Instagram" target="_blank" rel="noopener noreferrer">
          <i class="fa-brands fa-instagram" aria-hidden="true"></i>
        </a>
        <a href="https://linkedin.com/in/yourhandle" class="social-link" id="footer-linkedin" aria-label="LinkedIn" target="_blank" rel="noopener noreferrer">
          <i class="fa-brands fa-linkedin-in" aria-hidden="true"></i>
        </a>
        <a href="mailto:your@email.com" class="social-link" id="footer-email" aria-label="Send email">
          <i class="fa-regular fa-envelope" aria-hidden="true"></i>
        </a>
      </nav>
      <p class="footer-copy">&copy; 2026 Aarav Photography. All rights reserved.</p>
    </div>
  </footer>

  <!-- ============ LIGHTBOX ============ -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer" hidden>
    <button class="lightbox-close" id="lightbox-close" aria-label="Close photo viewer">&times;</button>
    <button class="lightbox-prev" id="lightbox-prev" aria-label="Previous photo">&#8592;</button>
    <div class="lightbox-img-wrap">
      <img src="" alt="" id="lightbox-img" class="lightbox-img">
    </div>
    <button class="lightbox-next" id="lightbox-next" aria-label="Next photo">&#8594;</button>
    <div class="lightbox-meta" id="lightbox-meta">
      <span class="lightbox-title" id="lightbox-title"></span>
      <span class="lightbox-cat" id="lightbox-cat"></span>
    </div>
  </div>
  <div class="lightbox-backdrop" id="lightbox-backdrop" hidden></div>

  <script src="main.js"></script>
</body>
</html>
