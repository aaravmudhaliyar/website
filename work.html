<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Aarav Photography — A fine art photography portfolio capturing landscapes, portraits, street scenes, and beyond.">
  <meta property="og:title" content="Aarav Photography">
  <meta property="og:description" content="Fine art photography — landscapes, portraits, street scenes, and beyond.">
  <meta name="twitter:card" content="summary_large_image">
  <title>Aarav Photography</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,200;0,300;0,400;0,500;0,600;1,200;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ============ HEADER ============ -->
  <header id="site-header" class="site-header">
    <div class="header-inner">
      <nav class="nav-left" aria-label="Primary navigation">
        <a href="work.html" class="nav-link" id="nav-work">Work</a>
        <a href="about.html" class="nav-link" id="nav-about">About</a>
      </nav>

      <a href="index.html" class="site-logo" id="site-logo" aria-label="Aarav Photography Home">
        Aarav
      </a>

      <nav class="nav-right" aria-label="Secondary navigation">
        <a href="https://instagram.com/apm_clicks" class="social-link" id="header-instagram" aria-label="Instagram" target="_blank" rel="noopener noreferrer">
          <i class="fa-brands fa-instagram" aria-hidden="true"></i>
        </a>
        <a href="https://linkedin.com/in/apm_clicks" class="social-link" id="header-linkedin" aria-label="LinkedIn" target="_blank" rel="noopener noreferrer">
          <i class="fa-brands fa-linkedin-in" aria-hidden="true"></i>
        </a>
        <a href="mailto:aaravmudhaliyar@gmail.com" class="social-link" id="header-email" aria-label="Send email">
          <i class="fa-regular fa-envelope" aria-hidden="true"></i>
        </a>
      </nav>
    </div>
  </header>

  <!-- ============ HERO ============ -->
  <section class="hero" id="hero" aria-label="Hero section">
    <div class="hero-content">
      <p class="hero-eyebrow">Fine Art Photography</p>
      <h1 class="hero-title">My<br><em>Work</em></h1>
      <p class="hero-sub">Light. Silence. Story.</p>
    </div>
    <div class="hero-scroll-indicator" aria-hidden="true">
      <span></span>
    </div>
  </section>

  <!-- ============ PHOTO GRID ============ -->
  <main class="photo-grid" id="photo-grid" aria-label="Photography portfolio grid">

    <figure class="grid-item" data-category="landscape" id="grid-item-1">
      <img src="static/photo_landscape.jpg" alt="Golden hour mist over mountain range" loading="lazy">
      <figcaption class="grid-caption">
        <span class="caption-title">Into the Mist</span>
        <span class="caption-cat">Landscape</span>
      </figcaption>
    </figure>

    <figure class="grid-item portrait-ratio" data-category="portrait" id="grid-item-2">
      <img src="static/photo_portrait.jpg" alt="Black and white portrait with dramatic window light" loading="lazy">
      <figcaption class="grid-caption">
        <span class="caption-title">Silence</span>
        <span class="caption-cat">Portrait</span>
      </figcaption>
    </figure>

    <figure class="grid-item" data-category="street" id="grid-item-3">
      <img src="static/photo_street.jpg" alt="Rainy night city street with neon reflections" loading="lazy">
      <figcaption class="grid-caption">
        <span class="caption-title">After Rain</span>
        <span class="caption-cat">Street</span>
      </figcaption>
    </figure>

    <figure class="grid-item portrait-ratio" data-category="portrait" id="grid-item-4">
      <img src="static/photo_wedding.jpg" alt="Bride and groom silhouette at golden hour sunset" loading="lazy">
      <figcaption class="grid-caption">
        <span class="caption-title">Golden Vow</span>
        <span class="caption-cat">Portrait</span>
      </figcaption>
    </figure>

    <figure class="grid-item square-ratio" data-category="nature" id="grid-item-5">
      <img src="static/photo_nature.jpg" alt="Dewdrop on spider web in forest morning light" loading="lazy">
      <figcaption class="grid-caption">
        <span class="caption-title">First Light</span>
        <span class="caption-cat">Nature</span>
      </figcaption>
    </figure>

    <figure class="grid-item" data-category="landscape" id="grid-item-6">
      <img src="static/photo_ocean.jpg" alt="Long exposure seascape at sunset with silky waves" loading="lazy">
      <figcaption class="grid-caption">
        <span class="caption-title">Still Waters</span>
        <span class="caption-cat">Landscape</span>
      </figcaption>
    </figure>

    <figure class="grid-item portrait-ratio" data-category="street" id="grid-item-7">
      <img src="static/photo_architecture.jpg" alt="Looking up at modern glass skyscraper" loading="lazy">
      <figcaption class="grid-caption">
        <span class="caption-title">Ascend</span>
        <span class="caption-cat">Street</span>
      </figcaption>
    </figure>

    <figure class="grid-item" data-category="landscape" id="grid-item-8">
      <img src="static/photo_winter.jpg" alt="Snowy pine forest path at blue hour" loading="lazy">
      <figcaption class="grid-caption">
        <span class="caption-title">Blue Hour Trail</span>
        <span class="caption-cat">Landscape</span>
      </figcaption>
    </figure>

  </main>

  <!-- ============ FOOTER ============ -->
  <footer class="site-footer" role="contentinfo">
    <div class="footer-inner">
      <a href="#" class="footer-logo" aria-label="Aarav Photography">Aarav</a>
      <p class="footer-tagline">Fine Art Photography</p>
      <p class="footer-copy">&copy; 2026 Aarav Photography. All rights reserved.</p>
    </div>
  </footer>

  <!-- ============ LIGHTBOX ============ -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer" hidden>
    <button class="lightbox-close" id="lightbox-close" aria-label="Close photo viewer">&times;</button>
    <button class="lightbox-prev" id="lightbox-prev" aria-label="Previous photo">&#8592;</button>
    <div class="lightbox-img-wrap">
      <img src="" alt="" id="lightbox-img" class="lightbox-img">
    </div>
    <button class="lightbox-next" id="lightbox-next" aria-label="Next photo">&#8594;</button>
    <div class="lightbox-meta" id="lightbox-meta">
      <span class="lightbox-title" id="lightbox-title"></span>
      <span class="lightbox-cat" id="lightbox-cat"></span>
    </div>
  </div>
  <div class="lightbox-backdrop" id="lightbox-backdrop" hidden></div>

  <script src="main.js"></script>
</body>
</html>
